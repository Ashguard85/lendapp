server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html: kein Cache – damit neue Deployments sofort aktiv werden
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # JS/CSS Assets: React generiert Content-Hash im Dateinamen
    # Aggressives Caching ist sicher weil der Filename sich bei Aenderungen aendert
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # API: kein Cache
    location /api/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        client_max_body_size 10M;
    }

    # React Router – alle anderen Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
