services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data          # persistent DB
      - ./lendapp.db:/app/lendapp.db  # local dev convenience
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  sqlite_data:
