services:
  api:
    build: ./lendapp
    ports:
      - "8100:8000"
    volumes:
      - /home/buebi/docker/lendapp/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./lendapp-frontend
    ports:
      - "3100:80"
    depends_on:
      - api
    restart: unless-stopped
