services:
  api:
    build: ./lendapp
    ports:
      - "8100:8000"
    volumes:
      - sqlite_data:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./lendapp-frontend
    ports:
      - "3100:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
